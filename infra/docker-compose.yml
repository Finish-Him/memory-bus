services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-memory_bus}
      HF_HOME: /app/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8400:8400"
    volumes:
      - hf-cache:/app/.cache/huggingface
    networks:
      - memory-bus

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-memory_bus}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - memory-bus-pgdata:/var/lib/postgresql/data
      - ./001_init_schemas.sql:/docker-entrypoint-initdb.d/001_init_schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-memory_bus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - memory-bus

networks:
  memory-bus:
    name: memory_bus
    driver: bridge

volumes:
  memory-bus-pgdata:
  hf-cache:
